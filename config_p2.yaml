# config_p2.yaml — Processo 2: Integração de planilhas das lojas
# Os caminhos são relativos ao diretório do script (antilhas/)

# Pasta raiz das planilhas enviadas pelas gerentes
dir_entrada: "00_ENTRADA/AUXILIAR_EMAIL"

# Aba dentro do arquivo .xlsm/.xlsx que a gerente envia (igual para todas as lojas)
aba_loja: "CONTAGEM Semanal"

# Diretórios compartilhados com o Processo 1
dirs:
  backup: "01_BACKUP"
  logs:   "02_LOGS"

# Caminhos das planilhas pai (mesmos do Processo 1)
planilhas_pai:
  praia: "04_PLANILHAS_PAI/PRAIA - Contagem Antilhas - 2026.xlsm"
  jau:   "04_PLANILHAS_PAI/JAÚ - Contagem Antilhas - 2026.xlsm"
  bauru: "04_PLANILHAS_PAI/BAURU - Contagem Antilhas - 2026.xlsm"

# ─────────────────────────────────────────────────────────────────────────────
# Template padrão de destinos
# Todas as lojas "comuns" (não CD/ER) compartilham EXATAMENTE este mapeamento.
# Se uma loja específica precisar de variação no futuro, basta substituir
# `<<: *PADRAO` por um bloco `destinos:` próprio.
# ─────────────────────────────────────────────────────────────────────────────
_template_padrao: &PADRAO
  destinos:
    # ── SACOLAS BOTICÁRIO 2025 ──
    F5:  { linha: 8,  usou: 1 }
    F6:  { linha: 9,  usou: 1 }
    F7:  { linha: 10, usou: 1 }
    F8:  { linha: 11, usou: 1 }
    # ── DIVERSOS BOTICÁRIO 2025 (com conversão PCT) ──
    D11: { linha: 14, usou: 1, pct_de: B11 }
    D12: { linha: 15, usou: 1, pct_de: B12 }
    D13: { linha: 16, usou: 1, pct_de: B13 }
    D14: { linha: 17, usou: 1, pct_de: B14 }
    # ── BOTI MÃES 2026 ──
    M11: { linha: 9,  usou: 2 }
    M12: { linha: 10, usou: 2 }
    M13: { linha: 11, usou: 2 }
    K16: { linha: 14, usou: 2 }
    K17: { linha: 15, usou: 2 }

