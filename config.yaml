# =============================================================================
# config.yaml — Configuração central do pipeline de Antilhas
# Toda configuração fica aqui. Nunca hardcode nos scripts.
# =============================================================================

# ---------------------------------------------------------------------------
# Caminhos base (relativos à raiz do projeto antilhas/)
# ---------------------------------------------------------------------------
caminhos:
  fontes_lojas:    "00_FONTES/lojas"
  fontes_sistema:  "00_FONTES/sistema"
  processados:     "01_PROCESSADOS"
  quarentena:      "02_QUARENTENA"
  logs:            "03_LOGS"
  planilhas_pai:   "04_PLANILHAS_PAI"

# ---------------------------------------------------------------------------
# Planilhas Pai por região
# ---------------------------------------------------------------------------
