# ---------------------------------------------------------------------------
# Mapeamento de produtos: arquivo da loja → Planilha Pai
#
# Cada entrada:
#   nome_loja:       nome exato como aparece no arquivo da loja (uppercase)
#   nome_pai:        nome exato como aparece na Planilha Pai (usado com .strip().upper())
#   bloco:           "esquerdo" (cols A-F) ou "direito" (cols H-M)
#   valor:           "total" (col F ou M) | "fechadas" (col D ou K) | "abertas" (col E ou L)
# ---------------------------------------------------------------------------
produtos:

  # ── Bloco esquerdo: SACOLA BOTICÁRIO 2025 ───────────────────────────────
  - nome_loja:  "SACOLA PP"
    nome_pai:   "SACOLA PP VERDE"
    bloco:      "esquerdo"
    valor:      "total"

  - nome_loja:  "SACOLA P"
    nome_pai:   "SACOLA P VERDE"
    bloco:      "esquerdo"
    valor:      "total"

  - nome_loja:  "SACOLA M"
    nome_pai:   "SACOLA M VERDE"
    bloco:      "esquerdo"
    valor:      "total"

  - nome_loja:  "SACOLA G"
    nome_pai:   "SACOLA G VERDE"
    bloco:      "esquerdo"
    valor:      "total"

  # ── Bloco esquerdo: DIVERSOS BOTICÁRIO 2025 ─────────────────────────────
  # Diversos não tem coluna Total → usar Fechadas (col D)
  - nome_loja:  "PAPEL DE SEDA"
    nome_pai:   "PAPEL DE SEDA 2025"
    bloco:      "esquerdo"
    valor:      "fechadas"

  - nome_loja:  "ETIQUETAS"
    nome_pai:   "ADESIVOS 2025"
    bloco:      "esquerdo"
    valor:      "fechadas"

  - nome_loja:  "TAG"
    nome_pai:   "TAGS"
    bloco:      "esquerdo"
    valor:      "fechadas"

  - nome_loja:  "LÂMINA OLFATIVA"
    nome_pai:   "LÂMINA OLFATIVA"
    bloco:      "esquerdo"
    valor:      "fechadas"

  # ── Bloco direito: CAIXAS ───────────────────────────────────────────────
  - nome_loja:  "CAIXAS DIVERTIDAMENTE"
    nome_pai:   "CAIXA M DIVERT./24"
    bloco:      "direito"
    valor:      "total"

  - nome_loja:  "CAIXAS G VERDE"
    nome_pai:   "CAIXA G VERDE"
    bloco:      "direito"
    valor:      "total"

  # ── Bloco direito: BOTI MÃES 2026 ───────────────────────────────────────
  - nome_loja:  "SACOLA P MÃES"
    nome_pai:   "SACOLA P MÃES"
    bloco:      "direito"
    valor:      "total"

  - nome_loja:  "SACOLA M MÃES"
    nome_pai:   "SACOLA M MÃES"
    bloco:      "direito"
    valor:      "total"

  - nome_loja:  "SACOLA G MÃES"
    nome_pai:   "SACOLA G MÃES"
    bloco:      "direito"
    valor:      "total"

  # ── Bloco direito: BOTI MÃES 2026 — Papel/Etiqueta ──────────────────────
  - nome_loja:  "PAPEL DE SEDA MÃES"
    nome_pai:   "PAPEL DE SEDA MÃES"
    bloco:      "direito"
    valor:      "fechadas"

  - nome_loja:  "ETIQUETA ADESIVA"
    nome_pai:   "ETIQUETA ADESIVA MÃES"
    bloco:      "direito"
    valor:      "fechadas"

